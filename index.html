<head>

<meta name="theme-color" content="#f9f9f6" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0e0d" media="(prefers-color-scheme: dark)">
    <title>99 Имен Аллаха</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300..900&family=Scheherazade+New:wght@400;700&family=Wix+Madefor+Display:wght@800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        html {
            background-color: #f9f9f6
        }
        html.dark {
            background-color: #0d0e0d
        }
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #f9f9f6;
            font-size: 0.85rem;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .dark body {
    background-color: #0d0e0d; /* для где зарядка сверху */
        }
        .arabic-text {
            font-family: 'Scheherazade New', serif;
            line-height: 3;
            font-size: 1.12rem
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card {
            animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        input, textarea {
            font-size: 16px;
        }

        /* Улучшенный градиентный заголовок */
        .gradient-heading {
            background-image: linear-gradient(to bottom, #1c1917 0%, #78716c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: background-image 0.3s ease;
        }
        .dark .gradient-heading {
            background-image: linear-gradient(to bottom, #ffffff 0%, #a8a29e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Уменьшенный арабский текст для ID 84 и 85 */
        [data-card-id="84"] .arabic-text {
        font-size: 1.25rem !important;
        }
        [data-card-id="85"] .arabic-text {
        font-size: 0.85rem !important;
        }
        [data-card-id="85"] h3 {
        font-size: 0.66rem !important;
        }
        /* Металлическая обводка кнопок */
        .metal-stop-0 { stop-color: #000000; stop-opacity: 0.18; }
        .metal-stop-25 { stop-color: #000000; stop-opacity: 0.05; }
        .metal-stop-50 { stop-color: #000000; stop-opacity: 0.00; }
        .metal-stop-75 { stop-color: #000000; stop-opacity: 0.04; }
        .metal-stop-100 { stop-color: #000000; stop-opacity: 0.12; }

        .dark .metal-stop-0 { stop-color: #ffffff; stop-opacity: 0.85; }
        .dark .metal-stop-25 { stop-color: #ffffff; stop-opacity: 0.28; }
        .dark .metal-stop-50 { stop-color: #ffffff; stop-opacity: 0.00; }
        .dark .metal-stop-75 { stop-color: #ffffff; stop-opacity: 0.10; }
        .dark .metal-stop-100 { stop-color: #ffffff; stop-opacity: 0.55; }
    </style>
</head>
<body class="text-stone-800 dark:bg-[#0d0e0d] dark:text-stone-300 min-h-screen flex flex-col transition-colors duration-300">

        <defs>

                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />

    <header class="pt-10 pb-6 px-4 text-center bg-white/70 dark:bg-[#0d0e0d]/70 backdrop-blur-2xl border-b border-stone-200/50 dark:border-stone-800/60 sticky top-0 z-40 transition-colors duration-300 shadow-sm">
        <div class="max-w-2xl mx-auto flex flex-col items-center">
            <h1 class="title-font text-3xl md:text-4xl font-extrabold mb-1 tracking-tight gradient-heading" style="font-family: 'Wix Madefor Display', sans-serif;">
                99 Имен Аллаха
            </h1>

            <div class="flex flex-col items-center opacity-85 dark:opacity-75 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" class="w-36 h-7 text-stone-800 dark:text-stone-200 mb-1" baseProfile="tiny" overflow="inherit" viewBox="0 0 176 36">
                    <switch><g><path fill="currentColor" d="5"></path></g></switch>
                </svg>
                <p class="text-stone-500 dark:text-stone-400 text-[8px] uppercase tracking-widest font-medium mt-1" style="font-family: 'Roboto Mono', monospace;">
                    Во имя Аллаха — Милостивого, Милосердного
                </p>
            </div>

            <div class="relative w-full max-w-md mx-auto">
                <input type="text" id="searchInput" placeholder="Поиск по имени, переводу, номеру..."
                class="w-full px-4 py-2 bg-stone-100/80 dark:bg-[#141614]/80 border border-stone-200/60 dark:border-stone-800 rounded-xl focus:outline-none focus:ring-1 focus:ring-stone-400 dark:focus:ring-stone-600 focus:border-transparent transition-all duration-300 pr-10 text-stone-800 dark:text-stone-200 text-base md:text-sm">

                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" />
                    </svg>

    <main class="max-w-5xl mx-auto px-4 py-6 flex-grow w-full">
        <div id="namesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 transition-all duration-300"></div>
        <div id="notFound" class="hidden text-center py-8 text-stone-400 text-xs font-light">Ничего не найдено. Попробуйте другой запрос.</div>
    </main>

    <footer class="py-5 border-t border-stone-200/60 dark:border-stone-900 text-center text-[10px] text-stone-400 dark:text-stone-500 font-light">
        © 2026 Прекрасные имена Аллаха. Сделано с уважением.
    </footer>

    <div id="fullscreenPage" class="fixed inset-0 bg-[#f9f9f6] dark:bg-[#0d0e0d] z-[70] overflow-y-auto hidden opacity-0 transition-opacity duration-300 p-4 md:p-8">
        <div class="max-w-3xl mx-auto my-2 md:my-6 relative">
            <button onclick="closeFullscreen()" class="sticky top-0 bg-[#f9f9f6]/90 dark:bg-[#0d0e0d]/90 backdrop-blur pb-4 pt-2 w-full flex items-center gap-1.5 text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors font-medium text-xs z-10">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />

                Назад

            <div class="flex items-end justify-between border-b border-stone-200/60 dark:border-stone-800/60 pb-6 mb-8 mt-4">
                <div class="space-y-1.5 pr-4">
                    <span id="fsId" class="text-[11px] font-mono opacity-40"></span>
                    <h1 id="fsTranslit" class="text-3xl md:text-4xl font-black text-stone-900 dark:text-stone-50 tracking-tight leading-none"></h1>
                    <p id="fsTranslation" class="text-sm md:text-base text-stone-500 dark:text-stone-400 font-medium"></p>
                </div>
                <div id="fsArabic" class="arabic-text text-[4rem] md:text-[5rem] leading-none text-stone-900 dark:text-stone-100 text-right select-none"></div>
            </div>

            <div class="space-y-8 text-sm text-stone-700 dark:text-stone-300">
                <div class="space-y-2">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest">Толкование</h2>
                    <p id="fsMeaning" class="font-normal text-stone-800 dark:text-stone-200 leading-relaxed text-base"></p>
                </div>

                <div id="fsRootBlock" class="hidden space-y-2">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest">Особенности</h2>
                    <p id="fsRoot" class="font-light text-stone-600 dark:text-stone-400 leading-relaxed"></p>
                </div>

                <div id="fsNotesBlock" class="hidden text-xs bg-stone-100/50 dark:bg-[#141614]/50 p-4 rounded-2xl border border-stone-200/40 dark:border-stone-800/40 text-stone-600 dark:text-stone-400">
                    <span id="fsNotes" class="font-medium text-stone-800 dark:text-stone-300"></span>
                </div>
                <div id="fsQuranSection" class="space-y-3 hidden">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest">Коран</h2>
                    <div id="fsQuranContainer" class="space-y-3"></div>
                </div>

                <div id="fsHadithSection" class="space-y-3 hidden">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest">Хадисы</h2>
                    <div id="fsHadithContainer" class="space-y-3"></div>
                </div>

<div id="fsDuaSection" class="space-y-3 hidden">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest">Дуа</h2>
                    <div id="fsDuaContainer" class="space-y-3"></div>
                </div>

                             <div id="fsShahadaSection" class="pt-8 mt-8 border-t-0 hidden text-center">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest mb-6">Шахада</h2>
                    <div id="fsShahadaContainer" class="flex flex-col gap-8"></div>
                </div>
            </div> <!-- Закрывает внутренний контейнер с контентом -->
        </div> <!-- Закрывает центровщик max-w-3xl -->
    </div> <!-- Закрывает сам fullscreenPage -->


<script>
    let namesData = [];
    let currentView = 'grid';
    const namesGrid = document.getElementById('namesGrid');
    const searchInput = document.getElementById('searchInput');
    const notFound = document.getElementById('notFound');
    const fullscreenPage = document.getElementById('fullscreenPage');
    
function updateThemeColor(color) {
    let meta = document.querySelector('meta[name="theme-color"]');
    if (!meta) {
        meta = document.createElement('meta');
        meta.name = 'theme-color';
        document.head.appendChild(meta);
    }
    meta.setAttribute('content', color);
}



function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
    const isDarkNow = document.documentElement.classList.contains('dark');
    updateThemeColor(isDarkNow ? '#0d0e0d' : '#f9f9f6');
}
    initTheme();

function toggleTheme() {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateThemeColor(isDark ? '#0d0e0d' : '#f9f9f6');
}
    
    function toggleView() {
        currentView = currentView === 'grid' ? 'list' : 'grid';
        const icon = document.getElementById('viewIcon');
        if (currentView === 'list') {
            namesGrid.className = "max-w-md mx-auto space-y-2 transition-all duration-300";
            icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5" />`;
        } else {
            namesGrid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 transition-all duration-300";
            icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />`;
        }
        renderCards(getFilteredData());
    }

    function levenshtein(a, b) {
        const tmp = [];
        for (let i = 0; i <= a.length; i++) { tmp[i] = [i]; }
        for (let j = 0; j <= b.length; j++) { tmp[0][j] = j; }
        for (let i = 1; i <= a.length; i++) {
            for (let j = 1; j <= b.length; j++) {
                tmp[i][j] = Math.min(
                    tmp[i - 1][j] + 1,
                    tmp[i][j - 1] + 1,
                    tmp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
                );
            }
        }
        return tmp[a.length][b.length];
    }

    // Вспомогательная функция для удаления апострофов, кавычек и дефисов/тире
    function normalizeString(str) {
        if (!str) return '';
        return str
            .toLowerCase()
            // Удаляет: ' ` ’ ‘ “ ” ´ ʻ ʼ " - – —
            .replace(/['\`‘’“”´ʻʼ\"\-–—]/g, '');
    }

    function checkWordMatch(queryWord, targetText) {
        if (!targetText) return false;
        
        // Нормализуем обе строки перед проверкой
        const normalizedTarget = normalizeString(targetText);
        const normalizedQuery = normalizeString(queryWord);

        if (normalizedTarget.includes(normalizedQuery)) return true;
        if (normalizedQuery.length <= 3) return false;

        // Разбиваем нормализованный текст на слова для алгоритма Левенштейна
        const targetWords = normalizedTarget.split(/[^a-zа-яё0-9]+/);
        const maxAllowedTypos = normalizedQuery.length >= 6 ? 2 : 1;

        return targetWords.some(tWord => {
            if (Math.abs(tWord.length - normalizedQuery.length) > maxAllowedTypos) return false;
            return levenshtein(normalizedQuery, tWord) <= maxAllowedTypos;
        });
    }

    function getFilteredData() {
        const query = searchInput.value.trim();
        if (!query) return namesData;
        
        // Разбиваем поисковый запрос по пробелам и нормализуем каждое слово отдельно
        const queryWords = query.split(/\s+/).map(word => normalizeString(word)).filter(Boolean);

        return namesData.filter(item => {
            return queryWords.every(word => {
                return (
                    item.id.toString() === word ||
                    checkWordMatch(word, item.translit) ||
                    checkWordMatch(word, item.translation) ||
                    checkWordMatch(word, item.meaning) ||
                    item.arabic.includes(word)
                );
            });
        });
    }

    function renderCards(data) {
        namesGrid.innerHTML = '';
        if (data.length === 0) {
            notFound.classList.remove('hidden');
            return;
        }
        notFound.classList.add('hidden');

        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.setAttribute('onclick', `openFullscreen(${item.id})`);
            card.setAttribute('data-card-id', item.id);
            card.style.animationDelay = `${index * 15}ms`;

            const formattedId = item.id < 10 ? `0${item.id}` : item.id;

            if (currentView === 'grid') {
                card.className = "bg-stone-100/50 dark:bg-[#141614]/50 border border-stone-200/50 dark:border-stone-800/60 rounded-2xl p-4 md:hover:border-stone-300 dark:md:hover:border-stone-600 transition-all duration-300 cursor-pointer flex flex-col justify-between opacity-0 animate-card";
                card.innerHTML = `
                    <div class="flex justify-between items-baseline mb-3">
                        <span class="text-[10px] font-mono opacity-40">${formattedId}</span>
                        <span class="arabic-text text-2xl text-stone-800 dark:text-stone-200 leading-none">${item.arabic}</span>
                    </div>
                    <div>
                        <h3 class="font-bold text-stone-900 dark:text-stone-100 text-[13px] tracking-tight mb-0.5">${item.translit}</h3>
                        <p class="text-stone-500 dark:text-stone-400 text-[11px] font-light truncate">${item.translation}</p>
                    </div>
                `;
            } else {
                card.className = "bg-stone-100/50 dark:bg-[#141614]/50 border border-stone-200/50 dark:border-stone-800/60 rounded-xl px-5 py-3.5 md:hover:border-stone-300 dark:md:hover:border-stone-600 transition-all duration-300 cursor-pointer flex items-center justify-between opacity-0 animate-card";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-mono opacity-40 w-4">${formattedId}</span>
                        <div>
                            <h3 class="font-bold text-stone-900 dark:text-stone-100 text-[13px] inline-block tracking-tight">${item.translit}</h3>
                            <span class="text-stone-500 dark:text-stone-400 text-[11px] font-light ml-2">— ${item.translation}</span>
                        </div>
                    </div>
                    <span class="arabic-text text-xl text-stone-800 dark:text-stone-200">${item.arabic}</span>
                `;
            }
            namesGrid.appendChild(card);
        });
    }

    searchInput.addEventListener('input', () => renderCards(getFilteredData()));

    function openFullscreen(id) {
        const item = namesData.find(n => n.id === id);
        if (!item) return;

        document.getElementById('fsId').innerText = item.id < 10 ? `0${item.id}` : item.id;
        document.getElementById('fsTranslit').innerText = item.translit;
        document.getElementById('fsTranslation').innerText = item.translation;
                        const fsArabicEl = document.getElementById('fsArabic');
        const parentHeader = fsArabicEl.parentElement; // Находим flex-контейнер шапки

        if (item.id === 85) {
            // 1. Центрируем круглую каллиграфию по вертикали относительно длинного текста
            parentHeader.classList.replace('items-end', 'items-center');
            
            // 2. Увеличиваем размер (до h-20 на мобильных и h-32 на десктопах), чтобы читались детали
            fsArabicEl.innerHTML = `<img src="85.svg" class="h-32 sm:h-40 md:h-56 w-auto object-contain inline-block dark:invert select-none" alt="Имя 85">`;
        } else {
            // Возвращаем стандартное выравнивание по базовой линии для обычного линейного текста
            parentHeader.classList.replace('items-center', 'items-end');
            fsArabicEl.innerText = item.arabic;
        }

        document.getElementById('fsMeaning').innerText = item.meaning;

        const rootBlock = document.getElementById('fsRootBlock');
        if (item.root_000) {
            rootBlock.classList.remove('hidden');
            document.getElementById('fsRoot').innerText = item.root_000;
        } else {
            rootBlock.classList.add('hidden');
        }

        const notesBlock = document.getElementById('fsNotesBlock');
        if (item.is_core === false) {
            notesBlock.classList.remove('hidden');
            document.getElementById('fsNotes').innerText = item.notes || "Это имя не входит в традиционный, наиболее распространенный список 99 имён, однако оно упоминается в Коране или достоверных хадисах.";
        } else {
            notesBlock.classList.add('hidden');
        }

        const quranSection = document.getElementById('fsQuranSection');
        const quranContainer = document.getElementById('fsQuranContainer');
        quranContainer.innerHTML = '';
        if (item.quran_references && item.quran_references.length > 0) {
            quranSection.classList.remove('hidden');
            item.quran_references.forEach(ref => {
                const wrap = ref.link_q ? document.createElement('a') : document.createElement('div');
                if (ref.link_q) {
                    wrap.setAttribute('href', ref.link_q);
                    wrap.setAttribute('target', '_blank');
                }
                wrap.className = "block p-4 rounded-2xl bg-stone-100/50 dark:bg-[#141614]/50 border border-stone-200/40 dark:border-stone-800/60 space-y-3 transition-colors hover:border-stone-300 dark:hover:border-stone-600";
                wrap.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest">
                        <span>Сура ${ref.surah}, Аят ${ref.ayah}</span>
                        ${ref.link_q ? `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25" />
                        </svg>` : ''}
                    </div>
                    <div class="arabic-text text-2xl md:text-3xl text-right text-stone-900 dark:text-stone-100 leading-normal select-all">${ref.text_arabic}</div>
                    <div class="pt-2.5 border-t border-stone-200/60 dark:border-stone-800/60">
                        <p class="text-stone-600 dark:text-stone-400 font-light leading-relaxed text-xs">«${ref.text_russian}»</p>
                    </div>
                `;
                quranContainer.appendChild(wrap);
            });
        } else {
            quranSection.classList.add('hidden');
        }
const shahadaSection = document.getElementById('fsShahadaSection');
        const shahadaContainer = document.getElementById('fsShahadaContainer');
        shahadaContainer.innerHTML = '';
        
        if (item.shahada && item.shahada.length > 0) {
            shahadaSection.classList.remove('hidden');
            item.shahada.forEach(shahada => {
                const wrap = document.createElement('div');
                wrap.className = "flex flex-col items-center space-y-5"; // Контейнер без рамок
                
                // SVG разделитель с затуханием по краям
                const fadeDivider = `
                    <svg class="w-full max-w-xs h-[1px] text-stone-300 dark:text-stone-700" preserveAspectRatio="none" viewBox="0 0 100 1">
                        <defs>
                            <linearGradient id="fade-line" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="currentColor" stop-opacity="0" />
                                <stop offset="50%" stop-color="currentColor" stop-opacity="1" />
                                <stop offset="100%" stop-color="currentColor" stop-opacity="0" />
                            </linearGradient>
                        </defs>
                        <rect width="100" height="1" fill="url(#fade-line)" />
                    </svg>
                `;

                wrap.innerHTML = `
                    <div class="arabic-text text-3xl md:text-4xl text-stone-900 dark:text-stone-100 text-center leading-normal select-all">
                        ${shahada.arabic}
                    </div>
                    
                    ${fadeDivider}
                    
                    ${shahada.translit ? `
                        <div class="text-stone-800 dark:text-stone-200 text-sm font-medium text-center px-4">
                            ${shahada.translit}
                        </div>
                        ${fadeDivider}
                    ` : ''}
                    
                    <div class="text-stone-500 dark:text-stone-400 text-sm font-light leading-relaxed text-center px-4 max-w-lg">
                        ${shahada.translation}
                    </div>
                `;
                shahadaContainer.appendChild(wrap);
            });
        } else {
            shahadaSection.classList.add('hidden');
        }
        const hadithSection = document.getElementById('fsHadithSection');
        const hadithContainer = document.getElementById('fsHadithContainer');
        hadithContainer.innerHTML = '';
        if (item.hadith_references && item.hadith_references.length > 0) {
            hadithSection.classList.remove('hidden');
            item.hadith_references.forEach(ref => {
                const isLinked = ref.link_h && ref.link_h.trim() !== '';
                const wrap = document.createElement(isLinked ? 'a' : 'div');
                if (isLinked) {
                    wrap.setAttribute('href', ref.link_h);
                    wrap.setAttribute('target', '_blank');
                }
                wrap.className = "block p-4 rounded-2xl bg-stone-100/50 dark:bg-[#141614]/50 border border-stone-200/40 dark:border-stone-800/60 space-y-3 transition-colors" + (isLinked ? " hover:border-stone-300 dark:hover:border-stone-600" : "");
                wrap.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest">
                        <span>${ref.collection} ${ref.number ? `№${ref.number}` : ''} ${ref.narrator ? `• ${ref.narrator}` : ''}</span>
                        ${isLinked ? `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25" />
                        </svg>` : ''}
                    </div>
                    ${ref.text_arabic ? `<div class="arabic-text text-2xl md:text-3xl text-right text-stone-900 dark:text-stone-100 leading-normal select-all">${ref.text_arabic}</div>` : ''}
                    <div class="pt-2.5 border-t border-stone-200/60 dark:border-stone-800/60">
                        <p class="text-stone-600 dark:text-stone-400 font-light leading-relaxed text-xs">«${ref.text_russian}»</p>
                    </div>
                `;
                hadithContainer.appendChild(wrap);
            });
        } else {
            hadithSection.classList.add('hidden');
        }

        const duaSection = document.getElementById('fsDuaSection');
        const duaContainer = document.getElementById('fsDuaContainer');
        duaContainer.innerHTML = '';
        if (item.duas && item.duas.length > 0) {
            duaSection.classList.remove('hidden');
            item.duas.forEach(dua => {
                const wrap = document.createElement('div');
                wrap.className = "p-4 rounded-2xl bg-stone-100/50 dark:bg-[#141614]/50 border border-stone-200/40 dark:border-stone-800/60 space-y-3";
                wrap.innerHTML = `
                    <div class="arabic-text text-2xl md:text-3xl text-stone-900 dark:text-stone-100 text-right leading-normal select-all">${dua.arabic}</div>
                    <div class="space-y-1.5 pt-2.5 border-t border-stone-200/60 dark:border-stone-800/60">
                        ${dua.translit ? `<div><p class="text-stone-800 dark:text-stone-200 text-xs font-medium">${dua.translit}</p></div>` : ''}
                        <div><p class="text-stone-500 dark:text-stone-400 text-xs font-light leading-relaxed">${dua.translation}</p></div>
                    </div>
                `;
                duaContainer.appendChild(wrap);
            });
        } else {
            duaSection.classList.add('hidden');
        }

        fullscreenPage.classList.remove('hidden');
        requestAnimationFrame(() => {
            fullscreenPage.classList.remove('opacity-0');
        });
        fullscreenPage.scrollTo({ top: 0 });
    }

    function closeFullscreen() {
        fullscreenPage.classList.add('opacity-0');
        setTimeout(() => fullscreenPage.classList.add('hidden'), 300);
    }

    async function loadNamesFromServer() {
        try {
            const response = await fetch('names.json');
            if (!response.ok) throw new Error(`Ошибка: ${response.status}`);
            namesData = await response.json();
            renderCards(namesData);
        } catch (error) {
            console.error(error);
            namesGrid.innerHTML = '';
            namesGrid.className = "flex justify-center items-center h-48 w-full col-span-full transition-all duration-300";
            namesGrid.innerHTML = `
                <div class="text-center p-6 bg-stone-100/50 dark:bg-[#141614]/50 border border-stone-200/50 dark:border-stone-800/60 rounded-2xl max-w-sm w-full">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 mx-auto text-stone-400 mb-3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <p class="text-stone-800 dark:text-stone-200 text-sm font-medium mb-1">Не удалось загрузить данные</p>
                    <p class="text-stone-500 dark:text-stone-400 text-xs font-light mb-4">Пожалуйста, проверьте подключение файла names.json</p>
                    <button onclick="location.reload()" class="text-xs px-5 py-2.5 bg-stone-800 dark:bg-stone-200 text-white dark:text-stone-900 rounded-xl hover:bg-stone-700 dark:hover:bg-white transition-colors">
                        Обновить страницу
                    </button>
                </div>
            `;
        }
    }

    loadNamesFromServer();
</script>
</body>
</html>
