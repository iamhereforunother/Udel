<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99 Имен Аллаха</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300..900&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

<body class="text-stone-800 dark:bg-[#0d0e0d] dark:text-stone-300 min-h-screen flex flex-col transition-colors duration-200">

    <div class="fixed top-3 right-3 z-50 flex gap-1.5">
        <button onclick="toggleView()" class="p-2 rounded-full bg-stone-100 dark:bg-[#141614] border border-stone-200/60 dark:border-stone-800 text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-all">
            <svg id="viewIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
            </svg>
        </button>
        <button onclick="toggleTheme()" class="p-2 rounded-full bg-stone-100 dark:bg-[#141614] border border-stone-200/60 dark:border-stone-800 text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 dark:hidden">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 hidden dark:block">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.59 1.59m12.38 12.38l1.59 1.59M21 12h-2.25m-13.5 0H3m2.22 9.78l1.59-1.59M17.66 6.34l1.59-1.59M12 7.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z" />
            </svg>

    </div>

    <header class="py-8 px-4 text-center bg-[#f9f9f6]/80 dark:bg-[#0d0e0d]/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-2xl md:text-3xl font-black text-stone-900 dark:text-stone-100 mb-1 tracking-tight">99 Имен Аллаха</h1>
            <p class="text-stone-500 dark:text-stone-400 text-xs font-light mb-5">Прекрасные имена Всевышнего с переводом, толкованием и поиском</p>
            
            <div class="relative max-w-md mx-auto">
                <input type="text" id="searchInput" placeholder="Поиск по имени, переводу, номеру..." 
                       class="w-full px-4 py-2 bg-stone-100 dark:bg-[#141614] border border-stone-200/60 dark:border-stone-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-stone-400 dark:focus:ring-stone-600 focus:border-transparent transition-all pr-10 text-stone-800 dark:text-stone-200 text-xs">
                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" />
                    </svg>

    <main class="max-w-5xl mx-auto px-4 py-6 flex-grow w-full">
        <div id="namesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 transition-all duration-200"></div>
        <div id="notFound" class="hidden text-center py-8 text-stone-400 text-xs font-light">Ничего не найдено. Попробуйте другой запрос.</div>
    </main>

    <footer class="py-4 border-t border-stone-200/60 dark:border-stone-900 text-center text-[10px] text-stone-400 dark:text-stone-500 font-light">
        © 2026 Прекрасные имена Аллаха. Сделано с уважением и любовью.
    </footer>

    <div id="fullscreenPage" class="fixed inset-0 bg-[#f9f9f6] dark:bg-[#0d0e0d] z-50 overflow-y-auto hidden opacity-0 transition-all duration-200 p-4 md:p-8">
        <div class="max-w-xl mx-auto my-4">
            
            <button onclick="closeFullscreen()" class="mb-6 flex items-center gap-1.5 text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors font-medium text-xs">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3. h-3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
                Назад
            </button>

            <div class="flex items-center justify-between border-b border-stone-200/60 dark:border-stone-850 pb-4 mb-4">
                <div class="space-y-0.5">
                    <span id="fsId" class="text-[10px] font-mono opacity-40"></span>
                    <h1 id="fsTranslit" class="text-xl font-black text-stone-900 dark:text-stone-50 tracking-tight"></h1>
                    <p id="fsTranslation" class="text-xs text-stone-500 dark:text-stone-400 font-medium"></p>
                </div>
                <div id="fsArabic" class="arabic-text text-5xl text-stone-900 dark:text-stone-100 text-right select-none"></div>
            </div>

            <div class="space-y-5 text-xs text-stone-700 dark:text-stone-300">
                
                <div class="space-y-1">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-wider">Толкование</h2>
                    <p id="fsMeaning" class="font-normal text-stone-800 dark:text-stone-200 leading-relaxed"></p>
                </div>

                <div id="fsRootBlock" class="hidden space-y-1">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-wider">Контекст</h2>
                    <p id="fsRoot" class="font-light text-stone-600 dark:text-stone-400 leading-relaxed"></p>
                </div>

                <div id="fsNotesBlock" class="hidden text-[11px] bg-stone-100 dark:bg-[#141614] p-3 rounded-lg border border-stone-200/40 dark:border-stone-800/40 text-stone-600 dark:text-stone-400">
                    <span id="fsNotes" class="font-light"></span>
                </div>

                <div class="space-y-1.5">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-wider">Коран</h2>
                    <div id="fsQuranContainer" class="space-y-1.5"></div>
                </div>

                <div id="fsHadithSection" class="space-y-1.5 hidden">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-wider">Хадисы</h2>
                    <div id="fsHadithContainer" class="space-y-1.5"></div>
                </div>

                <div id="fsDuaSection" class="space-y-2 hidden">
                    <h2 class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-wider">Дуа</h2>
                    <div id="fsDuaContainer" class="space-y-2"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let namesData = [];
        let currentView = 'grid';
        const namesGrid = document.getElementById('namesGrid');
        const searchInput = document.getElementById('searchInput');
        const notFound = document.getElementById('notFound');
        const fullscreenPage = document.getElementById('fullscreenPage');

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        function toggleView() {
            currentView = currentView === 'grid' ? 'list' : 'grid';
            const icon = document.getElementById('viewIcon');
            if (currentView === 'list') {
                namesGrid.className = "max-w-md mx-auto space-y-1.5 transition-all duration-200";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5" />`;
            } else {
                namesGrid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 transition-all duration-200";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />`;
            }
            renderCards(getFilteredData());
        }

        function levenshtein(a, b) {
            const tmp = [];
            for (let i = 0; i <= a.length; i++) { tmp[i] = [i]; }
            for (let j = 0; j <= b.length; j++) { tmp[0][j] = j; }
            for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                    tmp[i][j] = Math.min(
                        tmp[i - 1][j] + 1,
                        tmp[i][j - 1] + 1,
                        tmp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
                    );
                }
            }
            return tmp[a.length][b.length];
        }

        function checkWordMatch(queryWord, targetText) {
            if (!targetText) return false;
            const text = targetText.toLowerCase();
            if (text.includes(queryWord)) return true;
            if (queryWord.length <= 3) return false;

            const targetWords = text.split(/[^a-zа-яё0-9]+/);
            const maxAllowedTypos = queryWord.length >= 6 ? 2 : 1;

            return targetWords.some(tWord => {
                if (Math.abs(tWord.length - queryWord.length) > maxAllowedTypos) return false;
                return levenshtein(queryWord, tWord) <= maxAllowedTypos;
            });
        }

        function getFilteredData() {
            const query = searchInput.value.toLowerCase().trim();
            if (!query) return namesData;
            const queryWords = query.split(/\s+/);

            return namesData.filter(item => {
                return queryWords.every(word => {
                    const tagsStr = item.tags ? item.tags.join(' ') : '';
                    return (
                        item.id.toString() === word ||
                        checkWordMatch(word, item.translit) ||
                        checkWordMatch(word, item.translation) ||
                        checkWordMatch(word, item.meaning) ||
                        checkWordMatch(word, tagsStr) ||
                        item.arabic.includes(word)
                    );
                });
            });
        }

        function renderCards(data) {
            namesGrid.innerHTML = '';
            if (data.length === 0) {
                notFound.classList.remove('hidden');
                return;
            }
            notFound.classList.add('hidden');

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.setAttribute('onclick', `openFullscreen(${item.id})`);
                card.style.animationDelay = `${index * 10}ms`;
                
                const formattedId = item.id < 10 ? `0${item.id}` : item.id;

                if (currentView === 'grid') {
                    card.className = "bg-stone-150/40 dark:bg-[#141614] border border-stone-200/40 dark:border-stone-850 rounded-xl p-3.5 hover:border-stone-300 dark:hover:border-stone-700 transition-all duration-200 cursor-pointer flex flex-col justify-between opacity-0 animate-card";
                    card.innerHTML = `
                        <div class="flex justify-between items-baseline mb-2">
                            <span class="text-[10px] font-mono opacity-40">${formattedId}</span>
                            <span class="arabic-text text-xl text-stone-800 dark:text-stone-200">${item.arabic}</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-stone-900 dark:text-stone-100 text-xs tracking-tight">${item.translit}</h3>
                            <p class="text-stone-500 dark:text-stone-400 text-[11px] font-light truncate">${item.translation}</p>
                        </div>
                    `;
                } else {
                    card.className = "bg-stone-150/40 dark:bg-[#141614] border border-stone-200/40 dark:border-stone-850 rounded-lg px-4 py-2.5 hover:border-stone-300 dark:hover:border-stone-700 transition-all duration-200 cursor-pointer flex items-center justify-between opacity-0 animate-card";
                    card.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-mono opacity-40 w-4">${formattedId}</span>
                            <div>
                                <h3 class="font-bold text-stone-900 dark:text-stone-100 text-xs inline-block tracking-tight">${item.translit}</h3>
                                <span class="text-stone-500 dark:text-stone-400 text-[11px] font-light ml-1.5">— ${item.translation}</span>
                            </div>
                        </div>
                        <span class="arabic-text text-lg text-stone-800 dark:text-stone-200">${item.arabic}</span>
                    `;
                }
                namesGrid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', () => renderCards(getFilteredData()));

        function openFullscreen(id) {
            const item = namesData.find(n => n.id === id);
            if (!item) return;

            document.getElementById('fsId').innerText = item.id < 10 ? `0${item.id}` : item.id;
            document.getElementById('fsTranslit').innerText = item.translit;
            document.getElementById('fsTranslation').innerText = item.translation;
            document.getElementById('fsArabic').innerText = item.arabic;
            document.getElementById('fsMeaning').innerText = item.meaning;

            const rootBlock = document.getElementById('fsRootBlock');
            if (item.root_000) {
                rootBlock.classList.remove('hidden');
                document.getElementById('fsRoot').innerText = item.root_000;
            } else {
                rootBlock.classList.add('hidden');
            }

            const notesBlock = document.getElementById('fsNotesBlock');
            if (!item.is_core && item.notes) {
                notesBlock.classList.remove('hidden');
                document.getElementById('fsNotes').innerText = item.notes;
            } else {
                notesBlock.classList.add('hidden');
            }

            const quranContainer = document.getElementById('fsQuranContainer');
            quranContainer.innerHTML = '';
            if (item.quran_references && item.quran_references.length > 0) {
                item.quran_references.forEach(ref => {
                    const wrap = ref.link_q ? document.createElement('a') : document.createElement('div');
                    if (ref.link_q) {
                        wrap.setAttribute('href', ref.link_q);
                        wrap.setAttribute('target', '_blank');
                    }
                    wrap.className = "p-3 rounded-lg bg-stone-100 dark:bg-[#141614] border border-stone-200/40 dark:border-stone-850 space-y-1 block transition-opacity hover:opacity-90";
                    wrap.innerHTML = `
                        <div class="flex justify-between items-center text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-wider">
                            <span>Сура ${ref.surah}, Аят ${ref.ayah}</span>
                            ${ref.link_q ? `
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-2.5 h-2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                            </svg>` : ''}
                        </div>
                        <div class="arabic-text text-xl text-right text-stone-800 dark:text-stone-200 leading-normal">${ref.text_arabic}</div>
                        <p class="text-stone-600 dark:text-stone-400 font-light italic leading-relaxed">«${ref.text_russian}»</p>
                    `;
                    quranContainer.appendChild(wrap);
                });
            } else {
                quranContainer.innerHTML = `<p class="text-stone-400 text-[11px] font-light">Упоминания отсутствуют.</p>`;
            }

            const hadithSection = document.getElementById('fsHadithSection');
            const hadithContainer = document.getElementById('fsHadithContainer');
            hadithContainer.innerHTML = '';
            if (item.hadith_references && item.hadith_references.length > 0) {
                hadithSection.classList.remove('hidden');
                item.hadith_references.forEach(ref => {
                    const div = document.createElement('div');
                    div.className = "p-3 rounded-lg bg-stone-100 dark:bg-[#141614] border border-stone-200/40 dark:border-stone-850 space-y-1";
                    div.innerHTML = `
                        <div class="text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-wider">
                            ${ref.collection} ${ref.number ? `№${ref.number}` : ''} ${ref.narrator ? `(${ref.narrator})` : ''}
                        </div>
                        ${ref.text_arabic ? `<div class="arabic-text text-lg text-right text-stone-800 dark:text-stone-200 leading-normal">${ref.text_arabic}</div>` : ''}
                        <p class="text-stone-600 dark:text-stone-400 font-light leading-relaxed">${ref.text_russian}</p>
                    `;
                    hadithContainer.appendChild(div);
                });
            } else {
                hadithSection.classList.add('hidden');
            }

            const duaSection = document.getElementById('fsDuaSection');
            const duaContainer = document.getElementById('fsDuaContainer');
            duaContainer.innerHTML = '';
            if (item.duas && item.duas.length > 0) {
                duaSection.classList.remove('hidden');
                item.duas.forEach(dua => {
                    const div = document.createElement('div');
                    div.className = "p-3.5 rounded-xl bg-stone-100 dark:bg-[#141614] border border-stone-200/40 dark:border-stone-850 space-y-2";
                    div.innerHTML = `
                        <div class="arabic-text text-xl text-stone-900 dark:text-stone-100 text-right leading-normal select-all">${dua.arabic}</div>
                        <div class="space-y-1 pt-1.5 border-t border-stone-200/60 dark:border-stone-800/60">
                            ${dua.translit ? `<div><p class="text-stone-800 dark:text-stone-200 font-medium">${dua.translit}</p></div>` : ''}
                            <div><p class="text-stone-500 dark:text-stone-400 font-light leading-relaxed">${dua.translation}</p></div>
                        </div>
                    `;
                    duaContainer.appendChild(div);
                });
            } else {
                duaSection.classList.add('hidden');
            }

            fullscreenPage.classList.remove('hidden');
            setTimeout(() => { fullscreenPage.classList.remove('opacity-0'); }, 10);
            fullscreenPage.scrollTo({ top: 0 });
        }

        function closeFullscreen() {
            fullscreenPage.classList.add('opacity-0');
            setTimeout(() => fullscreenPage.classList.add('hidden'), 200);
        }

        async function loadNamesFromServer() {
            try {
                const response = await fetch('names.json');
                if (!response.ok) throw new Error(`Ошибка: ${response.status}`);
                namesData = await response.json();
                renderCards(namesData);
            } catch (error) {
                console.error(error);
                namesData = [
                    {
                        id: 1,
                        arabic: "الرَّحْمَنُ",
                        translit: "Ар-Рахман",
                        translation: "Всемилостивый",
                        meaning: "Обладающий безграничной милостью, которая охватывает абсолютно все Его творения в этом мире (и верующих, и неверующих).",
                        root_000: "Его милость опережает Его гнев. Это имя принадлежит только Создателю, и называть им творения строго запрещено.",
                        notes: "Входит в число 99 основных имен.",
                        is_core: true,
                        tags: ["Милость", "Забота"],
                        quran_references: [
                            { surah: 55, ayah: 1, text_arabic: "الرَّحْمَنُ", text_russian: "Милостивый", link_q: "https://quran.com/55:1" }
                        ],
                        hadith_references: [],
                        duas: [
                            { arabic: "يَا رَحْمَانُ ارْحَمْنَا بِرَحْمَتِكَ الْوَاسِعَةِ", translit: "Йа Рахману, ирхамна би-рахматика-ль-васи'ати", translation: "О Всемилостивый, помилуй нас Своей всеобъемлющей милостью." }
                        ]
                    },
                    {
                        id: 5,
                        arabic: "الْقُدُّوسُ",
                        translit: "Аль-Куддус",
                        translation: "Святой",
                        meaning: "Абсолютно Чистый от любых видов недостатков, пороков, упущений, слабостей или сходства с творениями. Тот, Кто совершенен во всех Своих качествах и действиях.",
                        root_000: "Понимание этого имени обязывает человека очищать свое поклонение от многобожия и показухи, а разум — от ложных представлений о Боге.",
                        notes: "Входит в число 99 основных имен.",
                        is_core: true,
                        tags: ["Чистота", "Святость"],
                        quran_references: [
                            { surah: 59, ayah: 23, text_arabic: "الْمَلِكُ الْقُدُّوسُ", text_russian: "Владыка, Святой", link_q: null }
